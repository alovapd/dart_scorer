<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>

  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="#00d48a" stroke-width="2" opacity="0.3"/>

  <!-- Dartboard rings -->
  <circle cx="256" cy="256" r="195" fill="#1a1a2e"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#2a3a5c" stroke-width="3"/>

  <!-- Outer double ring -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#00a86b" stroke-width="10" opacity="0.4"/>

  <!-- Treble ring -->
  <circle cx="256" cy="256" r="125" fill="none" stroke="#00a86b" stroke-width="8" opacity="0.3"/>

  <!-- Wire lines (segments) -->
  <g stroke="#2a3a5c" stroke-width="1.5" opacity="0.6">
    <line x1="256" y1="61" x2="256" y2="451"/>
    <line x1="61" y1="256" x2="451" y2="256"/>
    <line x1="118" y1="118" x2="394" y2="394"/>
    <line x1="394" y1="118" x2="118" y2="394"/>
    <line x1="88" y1="180" x2="424" y2="332"/>
    <line x1="88" y1="332" x2="424" y2="180"/>
    <line x1="180" y1="88" x2="332" y2="424"/>
    <line x1="332" y1="88" x2="180" y2="424"/>
  </g>

  <!-- Inner bull -->
  <circle cx="256" cy="256" r="45" fill="#16213e" stroke="#2a3a5c" stroke-width="2"/>
  <circle cx="256" cy="256" r="18" fill="#00d48a"/>
  <circle cx="256" cy="256" r="18" fill="none" stroke="#00a86b" stroke-width="2"/>

  <!-- Dart -->
  <g transform="rotate(-35, 270, 248)">
    <!-- Dart shaft -->
    <line x1="270" y1="248" x2="380" y2="138" stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Dart point -->
    <line x1="258" y1="260" x2="270" y2="248" stroke="#cccccc" stroke-width="4" stroke-linecap="round"/>
    <!-- Dart flights -->
    <polygon points="370,148 395,123 380,138" fill="#00d48a" opacity="0.9"/>
    <polygon points="370,148 395,153 380,138" fill="#00a86b" opacity="0.9"/>
    <polygon points="390,128 395,123 380,138" fill="#006b4a" opacity="0.9"/>
    <!-- Dart barrel grip lines -->
    <line x1="300" y1="218" x2="306" y2="212" stroke="#999" stroke-width="1.5"/>
    <line x1="308" y1="210" x2="314" y2="204" stroke="#999" stroke-width="1.5"/>
    <line x1="316" y1="202" x2="322" y2="196" stroke="#999" stroke-width="1.5"/>
  </g>

  <!-- Impact glow on bullseye -->
  <circle cx="260" cy="252" r="8" fill="#00d48a" opacity="0.4"/>
  <circle cx="260" cy="252" r="4" fill="#ffffff" opacity="0.6"/>
</svg>
